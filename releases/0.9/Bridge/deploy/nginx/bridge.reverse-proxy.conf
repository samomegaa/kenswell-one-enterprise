# Kenswell One Bridge reverse proxy baseline

upstream bridge_api {
  server 127.0.0.1:3000;
  keepalive 32;
}

upstream bridge_client_portal {
  server 127.0.0.1:8080;
  keepalive 32;
}

server {
  listen 80;
  server_name _;

  client_max_body_size 25m;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location /health {
    proxy_pass http://bridge_api/health;
    proxy_set_header Host $host;
    proxy_set_header X-Request-Id $request_id;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /ready {
    proxy_pass http://bridge_api/ready;
    proxy_set_header Host $host;
    proxy_set_header X-Request-Id $request_id;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /live {
    proxy_pass http://bridge_api/live;
    proxy_set_header Host $host;
    proxy_set_header X-Request-Id $request_id;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /api/client-portal/ {
    proxy_pass http://bridge_api/api/client-portal/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Request-Id $request_id;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    proxy_pass http://bridge_client_portal;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Request-Id $request_id;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
